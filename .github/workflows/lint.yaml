name: lint

on:
  pull_request:
    branches:
      - master

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - name: "Checkout repo"
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10 # or your version
          run_install: false
      - name: "Setup Node"
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: './pnpm-lock.yaml'
      - name: "Install Dependencies"
        run: "pnpm i"
      - name: "Run Backend Lint"
        run: "pnpm lint"
  lint-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - name: "Checkout repo"
        uses: actions/checkout@v4
      - name: "Setup Node"
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'apps/frontend/package-lock.json'
      - name: "Install Dependencies"
        run: "npm ci"
      - name: "Run Backend Lint"
        run: "npm run lint"

